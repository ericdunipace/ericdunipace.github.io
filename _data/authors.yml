# The primary author of this blog.
# Must be the same as `author` in `_config.yml`.
# Change `author1` to your shortname.
author1:
  name:              Eric A. Dunipace
  email:             edunipace@mail.harvard.edu

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about:             |
    I recently received my PhD in Biostatistics and am currently doing my 3rd year rotations at the David Geffen School of Medicine at UCLA. I was jointly advised by José R. Zubizarreta and Lorenzo Trippa.
    
     Currently, my research looks at the ways Optimal Transport methodology can be applied to different statistical inference problems.
     
     **Email:** edunipace [at] mail.harvard.edu

